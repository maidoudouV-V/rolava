name: Build Linux

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/rolava dist/rolava-linux-x86_64
          chmod +x dist/rolava-linux-x86_64
          tar -czf rolava-linux-x86_64.tar.gz -C dist rolava-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolava-linux-x86_64
          path: rolava-linux-x86_64.tar.gz
